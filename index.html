<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Node.js Backend Monitoring Dashboard</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.stat{
background:#334155;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
padding:12px;
border:none;
cursor:pointer;
margin:5px;
border-radius:6px;
font-weight:bold;
}

.get{background:#22c55e;}
.post{background:#3b82f6;color:white;}
.put{background:#f59e0b;}
.delete{background:#ef4444;color:white;}

pre{
background:black;
color:#00ff00;
padding:15px;
overflow:auto;
border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h1>Backend Server Dashboard</h1>
<p>Node.js + Express.js API Monitoring</p>
</div>

<div class="grid">

<div class="stat">
<h2 id="requests">0</h2>
<p>Total Requests</p>
</div>

<div class="stat">
<h2 id="users">1250</h2>
<p>Registered Users</p>
</div>

<div class="stat">
<h2 id="apis">12</h2>
<p>API Endpoints</p>
</div>

<div class="stat">
<h2 id="uptime">99.9%</h2>
<p>Server Uptime</p>
</div>

</div>

<div class="card">
<h2>API Testing Console</h2>

<button class="get" onclick="getData()">GET</button>
<button class="post" onclick="postData()">POST</button>
<button class="put" onclick="putData()">PUT</button>
<button class="delete" onclick="deleteData()">DELETE</button>

<pre id="output">
Server Ready...
</pre>
</div>

<div class="card">
<h2>Server Logs</h2>
<pre id="logs"></pre>
</div>

</div>

<script>

let count=0;

function updateStats(){
count++;
document.getElementById("requests").innerText=count;
}

function log(text){
document.getElementById("logs").innerHTML=
new Date().toLocaleTimeString()+" : "+text+"\n"+
document.getElementById("logs").innerHTML;
}

function getData(){

updateStats();

const data={
method:"GET",
route:"/api/students",
status:200,
responseTime:"45ms",
data:[
{id:1,name:"Bhargavi"},
{id:2,name:"Ravi"}
]
};

document.getElementById("output").textContent=
JSON.stringify(data,null,2);

log("GET /api/students 200 OK");
}

function postData(){

updateStats();

const data={
method:"POST",
route:"/api/students",
status:201,
message:"Student Created",
responseTime:"62ms"
};

document.getElementById("output").textContent=
JSON.stringify(data,null,2);

log("POST /api/students 201 CREATED");
}

function putData(){

updateStats();

const data={
method:"PUT",
route:"/api/students/1",
status:200,
message:"Record Updated",
responseTime:"40ms"
};

document.getElementById("output").textContent=
JSON.stringify(data,null,2);

log("PUT /api/students/1 200 OK");
}

function deleteData(){

updateStats();

const data={
method:"DELETE",
route:"/api/students/1",
status:200,
message:"Record Deleted",
responseTime:"38ms"
};

document.getElementById("output").textContent=
JSON.stringify(data,null,2);

log("DELETE /api/students/1 200 OK");
}

setInterval(()=>{
document.getElementById("uptime").innerText=
(99.5+Math.random()*0.5).toFixed(2)+"%";
},3000);

</script>

</body>
</html>
